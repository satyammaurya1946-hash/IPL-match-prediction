

services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
    env_file:
      - ./app/.env
    environment:
      - FLASK_ENV=development
    depends_on:
      - db

  db:
    image: postgres:15
    env_file:
      - ./app/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:

